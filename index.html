<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<meta name="theme-color" content="#6e7d39">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta name="apple-mobile-web-app-title" content="Herza Home">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Herza Home · Portal de clientes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#d3cdc1;            /* greige de fondo */
    --paper:#ffffff;
    --ink:#3a3a34;           /* títulos */
    --ink-strong:#2a2a25;    /* wordmark */
    --muted:#9a9286;         /* subtítulos / labels */
    --line:#e3ded3;
    --field:#f5f3ee;
    --olive:#6e7d39;
    --olive-dark:#5c6a2c;
    --gold:#a98f5c;
    --wa:#0c8a47;
    --btn:#26251f;--btn-h:#100f0a;
    --beige:#ddd2bc;--beige-h:#d1c5aa;--beige-ink:#4a463b;--beige-line:#cabda3;
    --shadow:0 1px 2px rgba(60,55,45,.05),0 10px 26px rgba(60,55,45,.08);
    --serif:'Playfair Display',Georgia,'Times New Roman',serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;color-scheme:light}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  .hidden{display:none!important}
  button{font-family:inherit;cursor:pointer;border:none}
  a{color:inherit;text-decoration:none}
  .wordmark{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:var(--ink-strong);font-weight:700;letter-spacing:-.6px}
  .eyebrow{font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);font-weight:600}

  /* botones base */
  .btn-olive{display:inline-flex;align-items:center;gap:8px;background:var(--olive);color:#fff;font-weight:600;font-size:14px;padding:11px 18px;border-radius:10px;transition:background .15s,transform .05s}
  .btn-olive:hover{background:var(--olive-dark)}
  .btn-olive:active{transform:translateY(1px)}
  .btn-ghost{display:inline-flex;align-items:center;gap:8px;background:transparent;color:#5c574c;font-weight:600;font-size:13px;padding:10px 15px;border-radius:10px;border:1px solid #c7c1b4;transition:background .15s}
  .btn-ghost:hover{background:rgba(255,255,255,.5)}
  .btn-share{display:inline-flex;align-items:center;gap:8px;background:var(--beige);color:var(--beige-ink);font-weight:600;font-size:14px;padding:11px 17px;border-radius:10px;border:1px solid var(--beige-line);box-shadow:0 1px 2px rgba(60,55,45,.12);transition:background .15s}
  .btn-share:hover{background:var(--beige-h)}
  .btn-share svg{width:15px;height:15px}

  .cloud{position:fixed;bottom:18px;right:18px;display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.7);color:#6b665b;font-size:12px;font-weight:600;padding:8px 14px;border-radius:999px;box-shadow:var(--shadow);z-index:40}
  .cloud .gd{width:8px;height:8px;border-radius:50%;background:var(--olive)}

  /* ---------- SPLASH ---------- */
  #splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .5s ease}
  #splash.hide{opacity:0;pointer-events:none}
  #splash .splash-mark{width:88px;height:88px;border-radius:21px;box-shadow:0 12px 28px rgba(60,55,45,.2);margin-bottom:18px}
  #splash .splash-name{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:30px;font-weight:500;color:var(--ink-strong);letter-spacing:.3px}
  #splash .splash-name span{color:var(--muted);font-weight:400}
  #splash .splash-sub{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-top:8px}
  #splash .splash-dots{display:flex;gap:7px;margin-top:26px}
  #splash .splash-dots i{width:8px;height:8px;border-radius:50%;background:var(--olive);opacity:.3;animation:sd 1s infinite}
  #splash .splash-dots i:nth-child(2){animation-delay:.15s}
  #splash .splash-dots i:nth-child(3){animation-delay:.3s}
  @keyframes sd{0%,100%{opacity:.3;transform:translateY(0)}40%{opacity:1;transform:translateY(-5px)}}
  @media(max-width:640px){#splash .wordmark{font-size:34px}}

  /* ---------- LOGIN ---------- */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px;position:relative}
  .home-pill{position:absolute;top:24px;left:24px}
  .login-card{width:100%;max-width:470px;background:var(--paper);border-radius:24px;box-shadow:0 20px 50px rgba(60,55,45,.14);padding:54px 56px 46px}
  .login-card .lk{text-align:center;margin-bottom:30px}
  .login-card .lk .wordmark{font-size:40px;line-height:1.1}
  .login-card .lk .sub{font-size:13px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .login-card .lk .div{width:46px;height:2px;background:var(--gold);margin:18px auto 0;border-radius:2px}
  .login-card .lk .cont{font-size:14px;color:var(--muted);margin-top:18px}
  .field{margin-bottom:18px}
  .field label{display:block;font-size:14px;color:#6b665b;margin-bottom:8px}
  .field input{width:100%;padding:13px 15px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:var(--field);color:var(--ink);color-scheme:light;-webkit-appearance:none;appearance:none;transition:border .15s,box-shadow .15s}
  .field input:focus{outline:none;border-color:var(--olive);box-shadow:0 0 0 3px rgba(110,125,57,.15);background:#fff}
  .btn-enter{width:100%;padding:14px;background:var(--olive);color:#fff;border-radius:10px;font-size:15px;font-weight:600;margin-top:8px;transition:background .15s,transform .05s}
  .btn-enter:hover{background:var(--olive-dark)}
  .btn-enter:active{transform:translateY(1px)}

  /* ---------- APP ---------- */
  #app{min-height:100vh}
  .wrap{max-width:1080px;width:100%;margin:0 auto;padding:34px 30px 90px}
  .app-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:26px}
  .app-head .wordmark{font-size:30px;line-height:1}
  .app-head .eyebrow{margin-top:8px}
  .app-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .user-chip{display:flex;align-items:center;gap:9px;margin-right:4px}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--olive);color:#fff;display:grid;place-items:center;font-weight:700;font-size:12px}
  .user-chip .meta{line-height:1.2}.user-chip .meta b{font-size:13px;color:var(--ink)}.user-chip .meta span{font-size:11px;color:var(--muted)}

  /* hero cliente */
  .hero{background:var(--paper);border-radius:18px;box-shadow:var(--shadow);padding:26px 28px;margin-bottom:26px;border-top:3px solid var(--olive)}
  .hero-row{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap}
  .hero .eyebrow{margin-bottom:8px}
  .hero h1{font-family:var(--serif);font-weight:600;font-size:27px;color:var(--ink-strong);line-height:1.15;margin-bottom:10px}
  .hero .addr{display:flex;gap:8px;color:#6b665b;font-size:14px;max-width:430px;line-height:1.5}
  .hero-right{display:flex;flex-direction:column;align-items:flex-end;gap:12px;flex-shrink:0}
  .status{display:inline-flex;align-items:center;gap:7px;background:#eef0e2;color:var(--olive-dark);font-weight:600;font-size:13px;padding:7px 14px;border-radius:999px;white-space:nowrap}
  .prog{text-align:right;min-width:160px}
  .prog .pl{font-size:12px;color:var(--muted);margin-bottom:6px}.prog .pl b{color:var(--ink);font-size:15px}
  .bar{height:7px;background:#eceadf;border-radius:999px;overflow:hidden}.bar>i{display:block;height:100%;background:var(--olive);border-radius:999px}
  .prog-meta{margin-top:12px;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .prog-meta .wk{font-size:13px;font-weight:600;color:var(--olive-dark)}
  .prog-meta .qt{font-size:12px;color:var(--muted)}
  .hero-actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
  .addr svg{flex-shrink:0}
  .btn-olive svg{flex-shrink:0;width:17px;height:17px}

  /* campana + notificaciones */
  .bell-wrap{position:relative}
  .bell-btn{width:40px;height:40px;border-radius:10px;background:var(--paper);display:grid;place-items:center;color:#5c574c;border:1px solid var(--line);box-shadow:var(--sh)}
  .bell-btn:hover{background:var(--field)}
  .bell-btn svg{width:19px;height:19px}
  .bell-badge{position:absolute;top:-6px;right:-6px;min-width:19px;height:19px;padding:0 5px;border-radius:999px;background:#c0432f;color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center;border:2px solid var(--bg)}
  .notis{background:var(--paper);border-radius:16px;box-shadow:var(--sh);margin-bottom:22px;overflow:hidden}
  .notis-head{display:flex;align-items:center;gap:10px;padding:15px 18px 11px}
  .notis-head .nb{width:30px;height:30px;border-radius:8px;background:#eef0e2;color:var(--olive);display:grid;place-items:center}
  .notis-head .nb svg{width:17px;height:17px}
  .notis-head .t{font-weight:600;font-size:15px;color:var(--ink)}
  .notis-head .badge{background:#c0432f;color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .notis-head .seen{margin-left:auto;font-size:12px;color:var(--beige-ink);font-weight:600;background:var(--beige);border:1px solid var(--beige-line);padding:7px 12px;border-radius:8px;cursor:pointer}
  .notis-head .seen:hover{background:var(--beige-h)}
  .noti{display:flex;align-items:center;gap:13px;padding:13px 18px;cursor:pointer;border-top:1px solid var(--line);transition:background .12s}
  .noti:hover{background:var(--field)}
  .noti.unread{background:#faf6ee}
  .noti .ni{width:40px;height:40px;border-radius:10px;background:#eef0e2;color:var(--olive);display:grid;place-items:center;flex-shrink:0}
  .noti .ni svg{width:19px;height:19px}
  .noti .nc{flex:1;min-width:0}.noti .nc b{font-size:13.5px;color:var(--ink);display:block}.noti .nc span{font-size:12px;color:var(--muted)}
  .noti .nt{font-size:11px;color:var(--muted);white-space:nowrap}
  .noti .udot{width:9px;height:9px;border-radius:50%;background:#c0432f;flex-shrink:0}

  .crumb{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--muted);margin-bottom:20px;flex-wrap:wrap}
  .crumb b{color:var(--ink)}
  .crumb a:hover{color:var(--olive)}

  .folders{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .folder{display:flex;flex-direction:column;align-items:center;text-align:center;background:transparent;-webkit-appearance:none;appearance:none;border:0;outline:none;box-shadow:none;-webkit-tap-highlight-color:transparent;padding:6px 4px;cursor:pointer;transition:transform .12s}
  .folder:focus,.folder:focus-visible{outline:none}
  .folder:hover{transform:translateY(-3px)}
  .folder:hover .ic{box-shadow:0 6px 14px rgba(60,55,45,.16)}
  .folder .ic{width:60px;height:60px;border-radius:18px;background:#fff;box-shadow:0 1px 4px rgba(60,55,45,.10);display:grid;place-items:center;line-height:0;color:var(--olive);margin-bottom:9px;transition:box-shadow .12s}
  .folder .ic svg{width:27px;height:27px}
  .folder .ftext{min-width:0}
  .folder b{font-size:12.5px;display:block;color:var(--ink);font-weight:600}
  .folder span{display:none}
  .folder .chev{display:none}

  .view-title{font-family:var(--serif);font-weight:600;font-size:23px;color:var(--ink-strong);margin-bottom:4px}
  .view-sub{color:var(--muted);font-size:14px;margin-bottom:24px}

  /* formulario agendar cita */
  .form-card{background:var(--paper);border-radius:16px;box-shadow:var(--shadow);padding:24px 26px;max-width:660px}
  .fg{margin-bottom:24px}
  .fg>.lab{display:block;font-size:14px;font-weight:600;color:var(--ink);margin-bottom:3px}
  .fg>.lhint{font-size:12px;color:var(--muted);margin-bottom:11px}
  .seg{display:flex;gap:10px;flex-wrap:wrap}
  .opt{flex:1;min-width:150px;border:1.5px solid var(--line);border-radius:11px;padding:13px 15px;cursor:pointer;font-size:14px;font-weight:600;color:#5c574c;background:var(--paper);display:flex;align-items:center;gap:11px;transition:.12s}
  .opt:hover{border-color:#c8c0b0}
  .opt.sel{border-color:var(--olive);background:#f1f3e8;color:var(--ink)}
  .opt .rdot{width:18px;height:18px;border-radius:50%;border:2px solid #c8c0b0;flex-shrink:0;display:grid;place-items:center}
  .opt.sel .rdot{border-color:var(--olive)}
  .opt.sel .rdot::after{content:'';width:9px;height:9px;border-radius:50%;background:var(--olive)}
  .opt small{display:block;font-weight:400;color:var(--muted);font-size:11px;margin-top:2px}
  .fld{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:var(--field);color:var(--ink);font-family:inherit;color-scheme:light;-webkit-appearance:none;appearance:none}
  .fld:focus{outline:none;border-color:var(--olive);box-shadow:0 0 0 3px rgba(110,125,57,.15);background:#fff}
  select.fld{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%235c574c' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:40px}
  input[type=date].fld{color-scheme:light}
  input[type=date].fld::-webkit-calendar-picker-indicator{opacity:.6;cursor:pointer}
  .checks{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .chk{display:flex;align-items:center;gap:11px;border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;cursor:pointer;transition:.12s}
  .chk:hover{border-color:#c8c0b0}.chk.sel{border-color:var(--olive);background:#f1f3e8}
  .chk .box{width:20px;height:20px;border-radius:6px;border:2px solid #c8c0b0;flex-shrink:0;display:grid;place-items:center;color:#fff}
  .chk .box svg{width:13px;height:13px;opacity:0}.chk.sel .box{background:var(--olive);border-color:var(--olive)}.chk.sel .box svg{opacity:1}
  .chk .cav{width:34px;height:34px;border-radius:50%;color:#fff;display:grid;place-items:center;font-weight:700;font-size:11px;flex-shrink:0}
  .chk .cn{font-size:13px;font-weight:600;color:var(--ink);line-height:1.2}.chk .cr{font-size:11px;color:var(--muted)}
  .aprob{display:flex;align-items:flex-start;gap:9px;background:#f6f4ee;border-radius:10px;padding:11px 13px;font-size:12.5px;color:#6b665b;margin-top:10px;line-height:1.45}
  .aprob svg{width:16px;height:16px;color:var(--olive);flex-shrink:0;margin-top:1px}
  .submit-row{display:flex;justify-content:flex-end;margin-top:4px}
  .ok-card{background:var(--paper);border-radius:16px;box-shadow:var(--shadow);padding:34px 30px;max-width:560px;text-align:center}
  .ok-card .okic{width:64px;height:64px;border-radius:50%;background:#eef0e2;color:var(--olive);display:grid;place-items:center;margin:0 auto 18px}
  .ok-card .okic svg{width:30px;height:30px}
  .ok-card h3{font-family:var(--serif);font-size:21px;color:var(--ink-strong);margin-bottom:8px}
  .ok-card p{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:18px}
  .ok-sum{text-align:left;background:var(--field);border-radius:11px;padding:14px 16px;margin-bottom:20px}
  .ok-sum .r{display:flex;justify-content:space-between;gap:12px;padding:6px 0;font-size:13px}
  .ok-sum .r .k{color:var(--muted)}.ok-sum .r .v{color:var(--ink);font-weight:600;text-align:right}
  @media(max-width:560px){.checks{grid-template-columns:1fr}}

  /* dudas */
  textarea.fld{min-height:96px;resize:vertical;line-height:1.5}
  .upload{border:1.5px dashed #c8c0b0;border-radius:12px;padding:24px;text-align:center;cursor:pointer;background:var(--field);transition:.12s}
  .upload:hover{border-color:var(--olive);background:#f1f3e8}
  .upload .uic{width:48px;height:48px;border-radius:12px;background:#eef0e2;color:var(--olive);display:grid;place-items:center;margin:0 auto 10px}
  .upload .uic svg{width:23px;height:23px}
  .upload .ut{font-size:14px;font-weight:600;color:var(--ink)}
  .upload .us{font-size:12px;color:var(--muted);margin-top:3px}
  .upload img{max-width:100%;max-height:220px;border-radius:8px;display:block;margin:0 auto}
  .duda{background:var(--paper);border-radius:14px;box-shadow:var(--shadow);padding:16px 18px;margin-bottom:13px}
  .duda-top{display:flex;align-items:center;gap:10px;margin-bottom:11px}
  .room{display:inline-flex;align-items:center;gap:6px;background:#eef0e2;color:var(--olive-dark);font-weight:600;font-size:12px;padding:5px 11px;border-radius:999px}
  .st{margin-left:auto;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px}
  .st.pend{background:#f7ead1;color:#8a5a14}.st.resp{background:#eef0e2;color:var(--olive-dark)}
  .duda .dthumb{width:100%;max-width:260px;height:155px;border-radius:10px;background-size:cover;background-position:center;margin-bottom:11px;border:1px solid var(--line)}
  .duda .nota{font-size:14px;color:var(--ink);line-height:1.5;margin-bottom:10px}
  .duda .resp{background:var(--field);border-left:3px solid var(--olive);border-radius:0 8px 8px 0;padding:11px 13px;font-size:13px;color:#5c574c;line-height:1.5}
  .duda .resp b{color:var(--ink);display:block;margin-bottom:3px;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .duda .meta{font-size:11px;color:var(--muted);margin-top:9px}
  .nueva-row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}

  /* comprobantes de pago */
  .section-h{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:24px 0 14px;flex-wrap:wrap}
  .section-h .st-title{font-weight:600;font-size:15px;color:var(--ink)}
  .comp{display:flex;align-items:center;gap:13px;background:var(--paper);border-radius:13px;padding:12px 15px;margin-bottom:11px;box-shadow:var(--shadow)}
  .comp .cth{width:60px;height:60px;border-radius:10px;background-size:cover;background-position:center;flex-shrink:0;border:1px solid var(--line)}
  .comp .ci{flex:1;min-width:0}
  .comp .ci .tp{display:inline-block;background:#eef0e2;color:var(--olive-dark);font-weight:600;font-size:11px;padding:3px 9px;border-radius:999px;margin-bottom:5px}
  .comp .ci b{font-size:13.5px;color:var(--ink);display:block}
  .comp .ci span{font-size:12px;color:var(--muted)}
  .comp .mt{font-weight:700;color:var(--ink);font-size:14px;white-space:nowrap;text-align:right;font-variant-numeric:tabular-nums}
  .empty{background:var(--field);border-radius:12px;padding:18px;text-align:center;color:var(--muted);font-size:13px}
  .empty-state{background:var(--paper);border-radius:14px;box-shadow:var(--shadow);padding:36px 24px;text-align:center}
  .empty-state .es-ic{width:54px;height:54px;border-radius:15px;background:#eef0e2;color:var(--olive);display:grid;place-items:center;margin:0 auto 14px}
  .empty-state .es-ic svg{width:26px;height:26px}
  .empty-state b{display:block;font-size:15px;color:var(--ink);margin-bottom:5px}
  .empty-state span{font-size:13px;color:var(--muted);line-height:1.5;display:block;max-width:320px;margin:0 auto}

  .contact-row{display:flex;align-items:center;gap:15px;background:var(--paper);border-radius:14px;padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow)}
  .contact-row .cav{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:16px;flex-shrink:0}
  .contact-row .cmeta{flex:1}.contact-row .cmeta b{font-size:15px;display:block;color:var(--ink)}.contact-row .cmeta span{font-size:13px;color:var(--muted)}

        <div class="r"><span class="k">Motivo</span><span class="v">${motivo}</span></div>
        <div class="r"><span class="k">Fecha propuesta</span><span class="v">${ffmt}</span></div>
        <div class="r"><span class="k">Horario deseado</span><span class="v">${hora||''} · ${durTxt||''}</span></div>
        <div class="r"><span class="k">Con</span><span class="v">${conts.join(', ')}</span></div>
        <div class="r"><span class="k">Premura</span><span class="v">${prem.getAttribute('data-v')}</span></div>
        ${notas?`<div class="r"><span class="k">Notas</span><span class="v">${notas}</span></div>`:''}
      </div>
      <button class="btn-olive" onclick="go('home')">Volver al inicio</button></div>`;
  };

  aceptarCita=async function(id){
    const {error}=await sb.from('citas').update({estado:'Confirmada'}).eq('id',id);
    if(error){toast('No se pudo confirmar la cita');return}
    toast('¡Cita confirmada!'); await cargarDatos(); go('cita');
  };
  function _modalFechaCli(titulo,defF,defH,defD,onOk){
    const ov=document.createElement('div');
    ov.style.cssText='position:fixed;inset:0;background:rgba(40,38,32,.5);display:flex;align-items:center;justify-content:center;z-index:99999;color-scheme:light;padding:18px';
    ov.innerHTML=`<div style="background:#fff;border-radius:18px;padding:22px;width:min(94vw,400px);box-shadow:0 24px 70px rgba(0,0,0,.3)">
      <h3 style="margin:0 0 4px;font-size:19px">${titulo}</h3>
      <p style="margin:0 0 16px;font-size:13px;color:var(--muted)">Propón la fecha y hora que te acomoden; Herza la confirmará.</p>
      <label class="lab" style="display:block;margin-bottom:5px">Fecha</label>
      <input type="date" id="_cmF" class="fld" style="width:100%;margin-bottom:12px" value="${defF||''}">
      <div style="display:flex;gap:10px">
        <div style="flex:1"><label class="lab" style="display:block;margin-bottom:5px">Hora</label><input type="time" id="_cmH" class="fld" style="width:100%" value="${defH||''}"></div>
        <div style="flex:1"><label class="lab" style="display:block;margin-bottom:5px">Duración</label><select id="_cmD" class="fld" style="width:100%"><option value="30">30 min</option><option value="60">1 hora</option><option value="90">1½ hora</option><option value="120">2 horas</option></select></div>
      </div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button class="btn-share" id="_cmC" style="flex:1">Cancelar</button>
        <button class="btn-olive" id="_cmO" style="flex:1;justify-content:center">${ICON.check} Enviar</button>
      </div></div>`;
    document.body.appendChild(ov);
    if(defD)ov.querySelector('#_cmD').value=String(defD);
    const close=()=>ov.remove();
    ov.querySelector('#_cmC').onclick=close;
    ov.addEventListener('click',e=>{if(e.target===ov)close()});
    ov.querySelector('#_cmO').onclick=()=>{const f=ov.querySelector('#_cmF').value,h=ov.querySelector('#_cmH').value,d=parseInt(ov.querySelector('#_cmD').value,10);if(!f){toast('Elige una fecha');return}close();onOk(f,h,d)};
  }
  contraCita=async function(id){
    const c=(citas||[]).find(x=>x.id===id)||{};
    _modalFechaCli('Proponer otra fecha', c.fecha_propuesta, c.hora, c.duracion_min, async (f,h,d)=>{
      const {error}=await sb.from('citas').update({fecha_propuesta:f,hora:h||null,duracion_min:d,estado:'Pendiente',propuesta_por:'cliente'}).eq('id',id);
      if(error){toast('No se pudo enviar la propuesta');return}
      toast('Tu propuesta fue enviada a Herza Studio'); await cargarDatos(); go('cita');
    });
  };
  enviarDuda=async function(){
    const ubic=document.getElementById('dudaUbic').value,nota=document.getElementById('dudaNota').value.trim();
    if(!ubic||!nota){toast('Indica la ubicación y escribe tu duda');return}
    let path=null;
    try{ if(dudaImg){const blob=await (await fetch(dudaImg)).blob();path=_uid+'/'+Date.now()+'.jpg';const up=await sb.storage.from('dudas').upload(path,blob,{contentType:blob.type||'image/jpeg'});if(up.error)path=null} }catch(e){path=null}
    const {error}=await sb.from('dudas').insert({obra_id:_obraId,cliente_id:_uid,ubicacion:ubic,nota,foto_path:path});
    if(error){toast('No se pudo enviar la duda');return}
    dudaImg=null;toast('Duda enviada · el equipo te responderá pronto');
    const {data:dd}=await sb.from('dudas').select('*').eq('obra_id',_obraId).order('created_at',{ascending:false});
    dudas=(dd||[]).map((d,i)=>({id:d.id,ubic:d.ubicacion,nota:d.nota,img:_gp(i),estado:d.estado,fecha:_fc(d.created_at),resp:d.respuesta}));
    go('dudas');
  };

  enviarComprobante=async function(gid){
    const g=relGastos.find(x=>x.id===gid);
    const tipo=document.getElementById('compTipo').value,prov=document.getElementById('compProv').value,monto=document.getElementById('compMonto').value.trim(),fecha=document.getElementById('compFecha').value,ref=document.getElementById('compRef').value.trim();
    if(!compImg||!tipo||!prov||!monto||!fecha){toast('Sube la captura y completa tipo, proveedor, monto y fecha');return}
    let path=null;
    try{ const blob=await (await fetch(compImg)).blob();path=_uid+'/'+Date.now()+'.jpg';const up=await sb.storage.from('comprobantes').upload(path,blob,{contentType:blob.type||'image/jpeg'});if(up.error)path=null }catch(e){path=null}
    const {error}=await sb.from('comprobantes').insert({obra_id:_obraId,cliente_id:_uid,gasto_semana:g.sem,tipo_pago:tipo,proveedor:prov,monto:(monto.charAt(0)==='$'?monto:'$ '+monto),fecha_pago:fecha,referencia:ref,foto_path:path});
    if(error){toast('No se pudo adjuntar el comprobante');return}
    compImg=null;toast('Comprobante adjuntado');
    const {data:comps}=await sb.from('comprobantes').select('*').eq('obra_id',_obraId).order('created_at',{ascending:false});
    g.comps=(comps||[]).filter(c=>c.gasto_semana===g.sem).map((c,k)=>({img:_gp(k),tipo:c.tipo_pago,prov:c.proveedor,monto:c.monto,fecha:c.fecha_pago,ref:c.referencia}));
    go('gasto_'+gid);
  };

  // Mantener sesión al recargar
  (async()=>{try{const {data:{session}}=await sb.auth.getSession();if(session){await cargarDatos();const sp=document.getElementById('splash');if(sp)sp.style.display='none';_mostrarApp();}}catch(e){}})();
</script>
</body>
</html>
