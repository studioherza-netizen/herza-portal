const _evalFormula = (s) => {
  let x = String(s||'').trim();
  if (x.startsWith('=')) x = x.slice(1);
  if (!x) return 0;
  if (!/^[\d+\-*/().%\s]+$/.test(x)) return null;
  x = x.replace(/(\d+(?:\.\d+)?)\s*%/g, '($1/100)');
  try {
    const r = new Function('return (' + x + ')')();
    return (typeof r === 'number' && isFinite(r)) ? r : null;
  } catch(e) { return null; }
};
const PriceInputCell = ({item, onChange, si}) => {
  const [draft, setDraft] = useState(null);
  const isEditing = draft !== null;
  const display = isEditing
    ? draft
    : (item.price ? new Intl.NumberFormat('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}).format(item.price) : '');
  return React.createElement('input', {
    type: 'text',
    value: display,
    onFocus: (e) => {
      const initial = item.priceFormula || (item.price ? String(item.price) : '');
      setDraft(initial);
      setTimeout(() => { try { e.target.select(); } catch(_){} }, 0);
    },
    onChange: (e) => setDraft(e.target.value),
    onBlur: () => {
      const v = (draft || '').trim();
      if (v.startsWith('=')) {
        const r = _evalFormula(v);
        onChange('priceFormula', v);
        onChange('price', (typeof r === 'number' && isFinite(r)) ? r : 0);
      } else {
        onChange('priceFormula', null);
        onChange('price', parseFloat(v) || 0);
      }
      setDraft(null);
    },
    onKeyDown: (e) => { if (e.key === 'Enter') e.target.blur(); },
    title: item.priceFormula ? 'Formula: ' + item.priceFormula : '',
    style: {...si, width: 110, textAlign: 'right', fontSize: 12, ...(item.priceFormula ? {background: '#fdf6e3'} : {})}
  });
};


const fmt = (n) => {
  if (n === 0) return "-";
  return new Intl.NumberFormat("es-MX", { style: "currency", currency: "MXN" }).format(n);
};
const fmtDate = (d) => {
  if (!d) return "";
  const date = new Date(d + "T12:00:00");
  return date.toLocaleDateString("es-MX", { day: "2-digit", month: "long", year: "numeric" });
};

  if (quote && quote.electricReq) { const r=quote.electricReq; return [{ collapsed:false, saved:true, ...r, id:"ER_"+uid(), rows:Array.isArray(r.rows)?r.rows:[] }]; }
  return [ emptyElectricReq(quote&&quote.project) ];
};
const loadResizedImage = (file, cb) => { const reader=new FileReader(); reader.onload=ev=>{ const img=new Image(); img.onload=()=>{ const max=160; let w=img.width,h=img.height; const s=Math.min(1,max/Math.max(w,h)); const cw=Math.max(1,Math.round(w*s)), ch=Math.max(1,Math.round(h*s)); const cv=document.createElement("canvas"); cv.width=cw; cv.height=ch; cv.getContext("2d").drawImage(img,0,0,cw,ch); try{ cb(cv.toDataURL("image/jpeg",0.6)); }catch(e){ cb(ev.target.result); } }; img.src=ev.target.result; }; reader.readAsDataURL(file); };

};

const loadQuotes = () => { try { const s = localStorage.getItem(QKEY); return s ? JSON.parse(s) : []; } catch(e) { return []; } };
const saveAllQuotes = (qs) => {
  let ok = true;
  const __payload = JSON.stringify(qs);
  const __trySet = () => { try { localStorage.setItem(QKEY, __payload); return true; } catch(e) { return e; } };
  let __res = __trySet();
  if (__res !== true) {
    try { localStorage.removeItem(BKEY); } catch(_){}
    try { localStorage.removeItem("herza_quotes"); } catch(_){}

    try{if(window._fbSaveTimer)clearTimeout(window._fbSaveTimer);window._fbSaveTimer=setTimeout(function(){try{window._fbSyncing=true;try{document.dispatchEvent(new Event("herza-sync-start"));}catch(_){}fbDb.ref("presupuestos").set(qs).then(function(){window._fbSyncing=false;window._lastSyncAt=Date.now();try{document.dispatchEvent(new Event("herza-sync-end"));}catch(_){}}).catch(function(){window._fbSyncing=false;try{document.dispatchEvent(new Event("herza-sync-end"));}catch(_){}});}catch(e){}},350);}catch(e){}
  return ok;
};
const exportSingleQuote = (q) => {
  const payload = { app:"herza-presupuesto", version:1, exportedAt:new Date().toISOString(), quotes:[q] };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type:"application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const stamp = new Date().toISOString().slice(0,10);
  const safeName = (q.project?.name || "cotizacion").replace(/[^a-zA-Z0-9-_]+/g,"_").slice(0,40) || "cotizacion";
  a.href = url; a.download = "herza-"+safeName+"-"+stamp+".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
};
const loadBackups = () => { try { return JSON.parse(localStorage.getItem(BKEY)||"[]"); } catch(e) { return []; } };
const exportBackup = (qs) => {
  const payload = { app:"herza-presupuesto", version:1, exportedAt:new Date().toISOString(), quotes:qs };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type:"application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,"-");
  a.href = url; a.download = "herza-respaldo-"+stamp+".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
};
const importBackupFromFile = (file) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      const arr = Array.isArray(parsed) ? parsed : (parsed.quotes || []);
      if (!Array.isArray(arr)) return reject(new Error("Formato inválido"));
      resolve(arr);
    } catch (e) { reject(e); }
  };
  reader.onerror = () => reject(reader.error);
  reader.readAsText(file);
});

      <td style={{padding:"4px 6px"}}><select value={item.unit} onChange={e=>onChange("unit",e.target.value)} style={{...si,width:85,fontSize:11,padding:"8px 4px"}}>{unitOptions.map(u=><option key={u} value={u}>{u}</option>)}</select></td>
      <td style={{padding:"4px 6px"}}><input type="number" min="0" step="0.5" value={item.qty} onChange={e=>onChange("qty",parseFloat(e.target.value)||0)} style={{...si,width:65,textAlign:"center",fontSize:12}} /></td>
      <td style={{padding:"4px 6px"}}><PriceInputCell item={item} onChange={onChange} si={si} /></td>
      <td style={{padding:"4px 6px",textAlign:"right",fontWeight:600,fontSize:13,color:total>0?C.accent:C.dim,minWidth:100}}>{fmt(total)}</td>
      <td style={{padding:"4px 2px"}}><button onClick={onRemove} style={{...sb,padding:6,background:"transparent",color:C.dim}} title="Eliminar"><IconTrash/></button></td>
    </tr>
  );
}

function CategorySection({cat, items, onItemChange, onAddItem, onRemoveItem, onMoveItem, onUpdateCat, onRemoveCat, onMoveUp, onMoveDown, canMoveUp, canMoveDown, onSwapWith, printMode}) {
  const [open, setOpen] = useState(true);
  const [dragOver, setDragOver] = useState(false);
  const subtotal = items.reduce((s,i)=>s+i.qty*i.price,0);
  if (printMode) {
    if (items.length===0) return null;
    return (
      <tbody>
        <tr className="cat-row"><td colSpan={7} style={{padding:"4px 12px",fontSize:12,fontWeight:600,color:"#fff",background:"#C2B098",WebkitPrintColorAdjust:"exact",printColorAdjust:"exact",letterSpacing:1}}>{cat.num} — {cat.name}</td></tr>
        {items.map(item=><QuoteItem key={item.id} item={item} printMode />)}
        <tr className="subtotal-row">
          <td colSpan={5} style={{background:"#F5F5F5",WebkitPrintColorAdjust:"exact",printColorAdjust:"exact"}}/>
          <td style={{padding:"8px",fontSize:12,textAlign:"right",fontWeight:600,color:"#888",background:"#F5F5F5",WebkitPrintColorAdjust:"exact",printColorAdjust:"exact",whiteSpace:"nowrap"}}>SUBTOTAL {cat.num}</td>
          <td style={{padding:"8px",fontSize:13,textAlign:"right",fontWeight:700,color:"#9a8774",background:"#F5F5F5",WebkitPrintColorAdjust:"exact",printColorAdjust:"exact",whiteSpace:"nowrap"}}>{fmt(subtotal)}</td>
        </tr>
      </tbody>
    );
  }
  return (
    <div
      onDragOver={e=>{e.preventDefault();setDragOver(true);}}
      onDragLeave={()=>setDragOver(false)}
      onDrop={e=>{e.preventDefault();setDragOver(false);const src=e.dataTransfer.getData("text/cat-id");if(src&&onSwapWith)onSwapWith(src);}}
      style={{background:C.card,borderRadius:10,border:dragOver?"2px dashed "+C.accent:"1px solid "+C.border,marginBottom:12,overflow:"hidden",transition:"border-color 0.15s"}}>
      <div style={{display:"flex",alignItems:"center",padding:"14px 18px",cursor:"pointer",justifyContent:"space-between"}} onClick={()=>setOpen(!open)}>
        <div style={{display:"flex",alignItems:"center",gap:12,flex:1}}>
          <IconChevron open={open}/>
          <input value={cat.num} onChange={e=>onUpdateCat("num",e.target.value)} onClick={e=>e.stopPropagation()} style={{fontSize:11,color:C.muted,fontWeight:700,background:C.bg,padding:"2px 8px",borderRadius:4,border:"1px solid "+C.border,width:50,textAlign:"center"}} title="Número de orden" />
          <input value={cat.name} onChange={e=>onUpdateCat("name",e.target.value)} onClick={e=>e.stopPropagation()} style={{...si,border:"none",background:"transparent",fontSize:14,fontWeight:600,padding:"2px 6px",letterSpacing:0.5}} />
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={e=>{e.stopPropagation();onMoveUp&&onMoveUp()}} disabled={!canMoveUp} style={{...sb,padding:"4px 8px",background:"transparent",color:canMoveUp?C.muted:C.dim,opacity:canMoveUp?1:0.3,cursor:canMoveUp?"pointer":"not-allowed",fontSize:14,fontWeight:700}} title="Subir categoría">▲</button>
          <button onClick={e=>{e.stopPropagation();onMoveDown&&onMoveDown()}} disabled={!canMoveDown} style={{...sb,padding:"4px 8px",background:"transparent",color:canMoveDown?C.muted:C.dim,opacity:canMoveDown?1:0.3,cursor:canMoveDown?"pointer":"not-allowed",fontSize:14,fontWeight:700}} title="Bajar categoría">▼</button>
          <span style={{fontSize:15,fontWeight:700,color:subtotal>0?C.accent:C.dim,marginLeft:8}}>{fmt(subtotal)}</span>
          <span
            draggable={true}
            onDragStart={e=>{e.dataTransfer.setData("text/cat-id",cat.id);e.dataTransfer.effectAllowed="move";}}
            onClick={e=>e.stopPropagation()}
            title="Arrastra para mover esta categoría"
            style={{cursor:"grab",padding:"6px 8px",color:C.muted,fontSize:18,lineHeight:1,userSelect:"none",letterSpacing:-2,fontWeight:700}}
          >⋮⋮</span>
          <button onClick={e=>{e.stopPropagation();onRemoveCat()}} style={{...sb,padding:6,background:"transparent",color:C.dim}} title="Eliminar categoría"><IconTrash/></button>
        </div>
      </div>
      {open && (
        <div style={{padding:"0 18px 14px"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>
              {["","CÓDIGO","CONCEPTO","UNIDAD","CANT.","P.U.","IMPORTE",""].map((h,i)=>(
                <th key={i} style={{padding:"6px",fontSize:10,color:C.dim,textAlign:i>=4?(i===7?"center":"right"):"left",fontWeight:600,letterSpacing:1,background:"#EEEEEE",WebkitPrintColorAdjust:"exact",printColorAdjust:"exact",borderBottom:"1px solid #BBB"}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {items.map((item,idx)=><QuoteItem key={item.id} item={item} onChange={(f,v)=>onItemChange(item.id,f,v)} onRemove={()=>onRemoveItem(item.id)} onMoveUp={()=>onMoveItem&&onMoveItem(item.id,-1)} onMoveDown={()=>onMoveItem&&onMoveItem(item.id,1)} canMoveUp={idx>0} canMoveDown={idx<items.length-1} />)}
            </tbody>
          </table>
          <button onClick={onAddItem} style={{...sb,background:C.bg,color:C.muted,marginTop:8,fontSize:12}}><IconPlus/> Agregar partida</button>
        </div>
      )}
    </div>
  );
}

function TotalsSection({categories, items, mgmtPct, setMgmtPct, ivaPct, setIvaPct}) {
  const subtotal = Object.values(items).flat().reduce((s,i)=>s+i.qty*i.price,0);
  const mgmt = subtotal*(mgmtPct/100);
  const iva = (subtotal+mgmt)*(ivaPct/100);
  const total = subtotal+mgmt+iva;
  return (
    <div style={{background:C.card,borderRadius:12,border:"1px solid "+C.border,padding:24,marginTop:20}}>
      <div style={{maxWidth:420,marginLeft:"auto"}}>
        {categories.map(cat=>{
          const st=(items[cat.id]||[]).reduce((s,i)=>s+i.qty*i.price,0);
          if(st===0) return null;
          return <div key={cat.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",fontSize:13,color:C.muted}}><span>Subtotal {cat.num} — {cat.name}</span><span>{fmt(st)}</span></div>;
        })}
        <div style={{borderTop:"1px solid "+C.border,marginTop:10,paddingTop:10}}>
          <div style={{display:"flex",justifyContent:"space-between",padding:"6px 0",fontSize:14,fontWeight:600}}><span>Subtotal</span><span>{fmt(subtotal)}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",fontSize:13}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span>Gerenciamiento</span>
              <input type="number" min="0" max="100" value={mgmtPct} onChange={e=>setMgmtPct(parseFloat(e.target.value)||0)} style={{...si,width:60,textAlign:"center",fontSize:12,padding:"4px 8px"}} />
              <span style={{color:C.dim}}>%</span>
            </div>
            <span>{fmt(mgmt)}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",fontSize:13}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span>IVA</span>
              <input type="number" min="0" max="100" value={ivaPct} onChange={e=>setIvaPct(parseFloat(e.target.value)||0)} style={{...si,width:60,textAlign:"center",fontSize:12,padding:"4px 8px"}} />
              <span style={{color:C.dim}}>%</span>
            </div>
            <span>{fmt(iva)}</span>
          </div>
        </div>
        <div style={{borderTop:"2px solid "+C.accent,marginTop:10,paddingTop:12,display:"flex",justifyContent:"space-between",fontSize:20,fontWeight:700}}>
          <span>GRAN TOTAL</span>
          <span style={{color:C.accent}}>{fmt(total)}</span>
        </div>
      </div>
    </div>
  );
}

function PaymentsTab({payments, setPayments, grandTotal}) {
  const totalPaid = payments.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const balance = grandTotal - totalPaid;
  return (
    <div>
      <h2 style={{fontSize:18,fontWeight:600,marginBottom:16,color:C.text}}>Balance de Pagos</h2>
      <div style={{background:C.card,borderRadius:12,border:"1px solid "+C.border,padding:20}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>
            {["FECHA","CONCEPTO","MÉTODO","MONTO",""].map((h,i)=>(
              <th key={i} style={{padding:"8px",fontSize:10,color:C.dim,textAlign:i===3?"right":"left",fontWeight:600,letterSpacing:1,borderBottom:"1px solid "+C.border}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {payments.map(p=>(
              <tr key={p.id}>
                <td style={{padding:"4px 6px"}}><input type="date" value={p.date} onChange={e=>setPayments(prev=>prev.map(x=>x.id===p.id?{...x,date:e.target.value}:x))} style={{...si,width:150,fontSize:12}} /></td>
                <td style={{padding:"4px 6px"}}><input value={p.concept} placeholder="Concepto del pago..." onChange={e=>setPayments(prev=>prev.map(x=>x.id===p.id?{...x,concept:e.target.value}:x))} style={{...si,fontSize:12}} /></td>
                <td style={{padding:"4px 6px"}}><select value={p.method} onChange={e=>setPayments(prev=>prev.map(x=>x.id===p.id?{...x,method:e.target.value}:x))} style={{...si,width:140,fontSize:12}}><option>TRANSFERENCIA</option><option>EFECTIVO</option><option>CHEQUE</option><option>TARJETA</option></select></td>
                <td style={{padding:"4px 6px"}}><input type="number" min="0" step="1000" value={p.amount} onChange={e=>setPayments(prev=>prev.map(x=>x.id===p.id?{...x,amount:parseFloat(e.target.value)||0}:x))} style={{...si,width:130,textAlign:"right",fontSize:12}} /></td>
                <td style={{padding:"4px 2px"}}><button onClick={()=>setPayments(prev=>prev.filter(x=>x.id!==p.id))} style={{...sb,padding:6,background:"transparent",color:C.dim}}><IconTrash/></button></td>
              </tr>
            ))}
          </tbody>
        </table>
        <button onClick={()=>setPayments(prev=>[...prev,emptyPayment()])} style={{...sb,background:C.bg,color:C.muted,marginTop:12,fontSize:12}}><IconPlus/> Agregar pago</button>
      </div>
      <div style={{background:C.card,borderRadius:12,border:"1px solid "+C.border,padding:20,marginTop:16,maxWidth:400,marginLeft:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",padding:"6px 0",fontSize:14}}><span style={{color:C.muted}}>Total Pagado</span><span style={{fontWeight:600,color:C.success}}>{fmt(totalPaid)}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",padding:"6px 0",fontSize:14}}><span style={{color:C.muted}}>Monto Presupuesto</span><span style={{fontWeight:600}}>{fmt(grandTotal)}</span></div>
        <div style={{borderTop:"2px solid "+(balance>0?C.danger:C.success),marginTop:8,paddingTop:8,display:"flex",justifyContent:"space-between",fontSize:16,fontWeight:700}}>
          <span>Saldo al día</span><span style={{color:balance>0?C.danger:C.success}}>{fmt(balance)}</span>
        </div>
      </div>
    </div>
  );
}

function ExpensesTab({expenseWeeks, setExpenseWeeks, onPrintWeek}) {
  const weeks = Array.isArray(expenseWeeks) ? expenseWeeks : [];
  const updWeek = (wid, fn) => setExpenseWeeks(prev => prev.map(w => w.id===wid ? fn(w) : w));
  const updateExp = (wid,id,f,v) => updWeek(wid, w => ({...w, expenses: w.expenses.map(x=>x.id===id?{...x,[f]:v}:x)}));
  const removeExp = (wid,id) => updWeek(wid, w => ({...w, expenses: w.expenses.filter(x=>x.id!==id)}));
  const addExp = (wid,method) => updWeek(wid, w => ({...w, expenses: [...w.expenses, {...emptyExpense(), method}]}));
  const toggle = (wid) => updWeek(wid, w => ({...w, collapsed: !w.collapsed}));
  const saveWeek = (wid) => updWeek(wid, w => ({...w, saved:true, collapsed:true}));
  const reopenWeek = (wid) => updWeek(wid, w => ({...w, saved:false, collapsed:false}));
  const addWeek = () => setExpenseWeeks(prev => [...prev.map(w=>({...w,collapsed:true})), {...emptyExpenseWeek(), date: today()}]);
  const delWeek = (wid) => { if (window.confirm("¿Eliminar esta semana y todos sus gastos?")) setExpenseWeeks(prev => prev.filter(w=>w.id!==wid)); };

  const weekTotal = (w) => (w.expenses||[]).reduce((s,e)=>s+e.qty*e.price,0);
  const fmtDate = (d) => { try { return d ? new Date(d+"T00:00:00").toLocaleDateString("es-MX",{day:"2-digit",month:"2-digit",year:"numeric"}) : ""; } catch(e){ return d||""; } };
  const grandMonto = weeks.reduce((s,w)=>s+weekTotal(w),0);
  const grandGer = grandMonto*0.10;

  const renderTable = (w, list, title, editable) => (
    <div style={{marginBottom:16}}>
      <h3 style={{fontSize:13,fontWeight:600,marginBottom:8,color:C.muted}}>{title}</h3>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr>
          {["FECHA","CATEGORÍA","CLAVE EN PPTO","CONCEPTO","UND","CANT","P.U.","IMPORTE",""].map((h,i)=>(
            <th key={i} style={{padding:"6px",fontSize:9,color:C.dim,textAlign:i>=5?"right":"left",fontWeight:600,letterSpacing:1,borderBottom:"1px solid "+C.border}}>{h}</th>
          ))}
        </tr></thead>
        <tbody>
          {list.map(exp=> editable ? (
            <tr key={exp.id}>
              <td style={{padding:"3px 4px"}}><input type="date" value={exp.date} onChange={e=>updateExp(w.id,exp.id,"date",e.target.value)} style={{...si,width:130,fontSize:11,padding:"6px 4px"}} /></td>
              <td style={{padding:"3px 4px"}}><input value={exp.agent} onChange={e=>updateExp(w.id,exp.id,"agent",e.target.value)} placeholder="Categoría" style={{...si,width:80,fontSize:11}} /></td>
              <td style={{padding:"3px 4px"}}><input value={exp.description} onChange={e=>updateExp(w.id,exp.id,"description",e.target.value)} placeholder="Clave en ppto" style={{...si,fontSize:11}} /></td>
              <td style={{padding:"3px 4px"}}><input value={exp.concept} onChange={e=>updateExp(w.id,exp.id,"concept",e.target.value)} placeholder="Concepto" style={{...si,width:100,fontSize:11}} /></td>
              <td style={{padding:"3px 4px"}}><select value={exp.unit} onChange={e=>updateExp(w.id,exp.id,"unit",e.target.value)} style={{...si,width:65,fontSize:10,padding:"6px 2px"}}>{unitOptions.map(u=><option key={u}>{u}</option>)}</select></td>
              <td style={{padding:"3px 4px"}}><input type="number" min="0" value={exp.qty} onChange={e=>updateExp(w.id,exp.id,"qty",parseFloat(e.target.value)||0)} style={{...si,width:50,textAlign:"center",fontSize:11}} /></td>
              <td style={{padding:"3px 4px"}}><input type="number" min="0" value={exp.price} onChange={e=>updateExp(w.id,exp.id,"price",parseFloat(e.target.value)||0)} style={{...si,width:90,textAlign:"right",fontSize:11}} /></td>
              <td style={{padding:"3px 4px",textAlign:"right",fontWeight:600,fontSize:12,color:C.accent,minWidth:80}}>{fmt(exp.qty*exp.price)}</td>
              <td style={{padding:"3px 2px"}}><button onClick={()=>removeExp(w.id,exp.id)} style={{...sb,padding:4,background:"transparent",color:C.dim}}><IconTrash/></button></td>
            </tr>
          ) : (
            <tr key={exp.id} style={{borderBottom:"1px solid "+C.border}}>
              <td style={{padding:"6px 4px",fontSize:11}}>{fmtDate(exp.date)}</td>
              <td style={{padding:"6px 4px",fontSize:11}}>{exp.agent||""}</td>
              <td style={{padding:"6px 4px",fontSize:11}}>{exp.description||""}</td>
              <td style={{padding:"6px 4px",fontSize:11}}>{exp.concept||""}</td>
              <td style={{padding:"6px 4px",fontSize:11}}>{exp.unit||""}</td>
              <td style={{padding:"6px 4px",fontSize:11,textAlign:"right"}}>{exp.qty}</td>
              <td style={{padding:"6px 4px",fontSize:11,textAlign:"right"}}>{fmt(exp.price)}</td>
              <td style={{padding:"6px 4px",fontSize:12,textAlign:"right",fontWeight:600,color:C.accent,minWidth:80}}>{fmt(exp.qty*exp.price)}</td>
              <td></td>
            </tr>
          ))}
          {list.length===0 && <tr><td colSpan={9} style={{padding:"8px 6px",textAlign:"center",color:C.dim,fontSize:11}}>Sin registros</td></tr>}
        </tbody>
      </table>
    </div>
  );

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <h2 style={{fontSize:18,fontWeight:600,color:C.text,margin:0}}>Relación de Gastos Semanal</h2>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={()=>window.HZObra&&window.HZObra.conectar()} style={{...sb,background:C.bg,color:C.muted,fontSize:13,border:"1px solid "+C.border}}>🔗 Conectar con app obra</button>
          <button onClick={addWeek} style={{...sb,background:C.accent,color:"#fff",fontSize:13}}><IconPlus/> Agregar semana nueva</button>
        </div>
      </div>

      {weeks.map((w,idx)=>{
        const total = weekTotal(w);
        const ger = total*0.10;
        const transf = (w.expenses||[]).filter(e=>e.method==="TRANSFERENCIA");
        const efec = (w.expenses||[]).filter(e=>e.method==="EFECTIVO");
        return (
          <div key={w.id} style={{background:C.card,borderRadius:12,border:"1px solid "+C.border,marginBottom:12,overflow:"hidden"}}>
            <div onClick={()=>toggle(w.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:w.collapsed?"#f3f2ec":"#faf9f4",cursor:"pointer",flexWrap:"wrap"}}>
              <IconChevron open={!w.collapsed}/>
              <span style={{fontWeight:600,color:C.text,fontSize:14}}>Semana {idx+1}</span>
              {!w.saved
                ? <input type="date" value={w.date} onClick={e=>e.stopPropagation()} onChange={e=>updWeek(w.id,x=>({...x,date:e.target.value}))} style={{...si,width:140,fontSize:11,padding:"5px 6px"}} />
                : <span style={{fontSize:12,color:C.muted}}>del {fmtDate(w.date)}</span>}
              {w.saved
                ? <span style={{fontSize:10,background:"#e6ebd4",color:"#5b6033",padding:"2px 8px",borderRadius:20,fontWeight:600}}>Guardada</span>
                : <span style={{fontSize:10,background:"#f4e3cf",color:"#8a5a1b",padding:"2px 8px",borderRadius:20,fontWeight:600}}>En curso</span>}
              <span style={{marginLeft:"auto",textAlign:"right",lineHeight:1.3}}>
                <span style={{display:"block",fontSize:10,color:C.dim,letterSpacing:0.5}}>PAGADO · GERENC.</span>
                <span style={{fontWeight:600,color:C.accent,fontSize:13}}>{fmt(total)} · {fmt(ger)}</span>
              </span>
              <button onClick={e=>{e.stopPropagation(); onPrintWeek&&onPrintWeek(w.id);}} title={"Exportar Semana "+(idx+1)+" a PDF"} style={{...sb,background:C.accent,color:"#fff",fontSize:12,padding:"7px 12px"}}><IconPdf/> PDF</button>
            </div>
            {!w.collapsed && (
              <div style={{padding:"8px 16px 16px"}}>
                {renderTable(w, transf, "PAGOS VÍA TRANSFERENCIA", !w.saved)}
                {renderTable(w, efec, "PAGOS EN EFECTIVO", !w.saved)}
                {!w.saved ? (
                  <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap",alignItems:"center"}}>
                    <button onClick={()=>addExp(w.id,"TRANSFERENCIA")} style={{...sb,background:C.bg,color:C.muted,fontSize:12}}><IconPlus/> Transferencia</button>
                    <button onClick={()=>addExp(w.id,"EFECTIVO")} style={{...sb,background:C.bg,color:C.muted,fontSize:12}}><IconPlus/> Efectivo</button>
                    <button onClick={()=>saveWeek(w.id)} style={{...sb,background:C.accent,color:"#fff",fontSize:12}}>💾 Guardar y plegar semana</button>
                    <button onClick={()=>onPrintWeek&&onPrintWeek(w.id)} style={{...sb,background:C.bg,color:C.muted,fontSize:12,border:"1px solid "+C.border}}><IconPdf/> Exportar esta semana</button>
                    <button onClick={()=>delWeek(w.id)} style={{...sb,background:"transparent",color:C.danger,fontSize:12,marginLeft:"auto"}}><IconTrash/> Eliminar semana</button>
                  </div>
                ) : (
                  <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap",alignItems:"center"}}>
                    <button onClick={()=>reopenWeek(w.id)} style={{...sb,background:C.bg,color:C.muted,fontSize:12}}>✎ Reabrir para editar</button>
                    <button onClick={()=>onPrintWeek&&onPrintWeek(w.id)} style={{...sb,background:C.bg,color:C.muted,fontSize:12,border:"1px solid "+C.border}}><IconPdf/> Exportar esta semana</button>
                    <button onClick={()=>window.HZObra&&window.HZObra.enviar(w, idx, total)} style={{...sb,background:C.accent,color:"#fff",fontSize:12}}>↗ Enviar a la app de obra</button>
                    <button onClick={()=>delWeek(w.id)} style={{...sb,background:"transparent",color:C.danger,fontSize:12}}><IconTrash/> Eliminar semana</button>
                    <span style={{marginLeft:"auto",fontSize:12,color:C.muted}}>Gasto: <b style={{color:C.text}}>{fmt(total)}</b> · Gerenc. 10%: <b style={{color:C.accent}}>{fmt(ger)}</b></span>
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}

      <div style={{background:C.card,borderRadius:12,border:"1px solid "+C.border,padding:20,marginTop:16,maxWidth:420,marginLeft:"auto"}}>
        <div style={{fontSize:11,color:C.dim,letterSpacing:1,marginBottom:10,fontWeight:600}}>ACUMULADO DE TODAS LAS SEMANAS</div>
        <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",fontSize:13,color:C.muted}}><span>Semanas registradas</span><span>{weeks.length}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",fontSize:14,color:C.text}}><span style={{fontWeight:600}}>Total Monto Pagado</span><span style={{fontWeight:700}}>{fmt(grandMonto)}</span></div>
        <div style={{borderTop:"2px solid "+C.accent,marginTop:8,paddingTop:8,display:"flex",justifyContent:"space-between",fontSize:15,fontWeight:700}}>

    </div>
  );
}

const LUZ_OPTS = ["","CÁLIDA","NEUTRA","BLANCA","RGB"];

function ElectricReqTab({reqs, setReqs, variant}) {
  const isMat = variant==="material";
  const defTitle = isMat ? "ENTREGA DE MATERIAL" : "REQUISICIÓN ELÉCTRICO";
  const docLabel = isMat ? "Entrega" : "Requisición";
  const newRow = isMat ? emptyMaterialRow : emptyElectricRow;
  const newReq = isMat ? emptyMaterialReq : emptyElectricReq;
  const TP="#a8a08f", TPL="#efece5";
  const list = Array.isArray(reqs) ? reqs : [];
  const upd = (id, fn)=> setReqs(prev=> prev.map(r=> r.id===id ? fn(r) : r));
  const setField = (id,f,v)=> upd(id, r=>({...r,[f]:v}));
  const updRow = (id,rid,f,v)=> upd(id, r=>({...r, rows:(r.rows||[]).map(x=>x.id===rid?{...x,[f]:v}:x)}));
  const addRow = (id)=> upd(id, r=>({...r, rows:[...(r.rows||[]), newRow()]}));
  const delRow = (id,rid)=> upd(id, r=>({...r, rows:(r.rows||[]).filter(x=>x.id!==rid)}));
  const onFoto = (id,rid,e)=>{ const f=e.target.files&&e.target.files[0]; if(f) loadResizedImage(f, durl=> updRow(id,rid,"foto",durl)); e.target.value=""; };
  const toggle = (id)=> upd(id, r=>({...r, collapsed:!r.collapsed}));
  const saveReq = (id)=> upd(id, r=>({...r, saved:true, collapsed:true}));
  const reopen = (id)=> upd(id, r=>({...r, saved:false, collapsed:false}));
  const addReq = ()=> setReqs(prev=>[...prev.map(r=>({...r,collapsed:true})), newReq(null)]);
  const delReq = (id)=>{ if(window.confirm("¿Eliminar esta "+docLabel.toLowerCase()+" y todos sus materiales?")) setReqs(prev=>prev.filter(r=>r.id!==id)); };
  const fmtDate = (s)=>{ try{ return s? new Date(s+"T00:00:00").toLocaleDateString("es-MX",{day:"2-digit",month:"2-digit",year:"numeric"}):""; }catch(e){return s||"";} };
  const hcell = {padding:"4px 8px",background:TPL,color:"#55504a",fontSize:11,border:"1px solid #fff",whiteSpace:"nowrap"};
  const infoInput = {...si,fontSize:11,padding:"4px 6px",textAlign:"right",border:"1px solid #e7e3da",background:"#fff",width:"100%"};
  const cellRO = {padding:"6px 5px",border:"1px solid #f0ede6",fontSize:11,textAlign:"center",color:"#444"};
  const cols= isMat
    ? ["CÓDIGO PRODUCTO","TIPO","CANTIDAD","DESCRIPCION","UBICACIÓN","CÓDIGO INTERNO PLANO",""]
    : ["CÓDIGO PRODUCTO","TIPO","CANTIDAD","DESCRIPCION","TIPO DE LUZ","FOTO","UBICACIÓN","CÓDIGO INTERNO PLANO",""];

  const infoRow = (d, ed, lbl, key, isDate) => (
    <tr key={key}><td style={hcell}>{lbl}</td><td style={{padding:"2px 4px",border:"1px solid "+TPL}}>
      {ed
        ? (isDate
            ? <input type="date" value={d[key]||""} onChange={e=>setField(d.id,key,e.target.value)} style={{...infoInput,textAlign:"left"}}/>
            : <input value={d[key]||""} onChange={e=>setField(d.id,key,e.target.value)} style={infoInput}/>)
        : <div style={{textAlign:"right",padding:"4px 6px"}}>{isDate?fmtDate(d[key]):(d[key]||"")}</div>}
    </td></tr>
  );

  const renderForm = (d, ed) => (
    <div style={{overflowX:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:20,minWidth:840,marginBottom:14}}>
        <div style={{flexShrink:0}}>
          <h1 style={{margin:0,fontSize:30,fontWeight:300,color:"#333",letterSpacing:0,lineHeight:1}}>Herza Studio.</h1>
          <svg width="245" height="12" viewBox="0 0 245 12" style={{display:"block",marginTop:6}}><text x="122.5" y="9" fontSize="7.5" fill="#888" fontFamily="Arial,Helvetica,sans-serif" textAnchor="middle" textLength="225" lengthAdjust="spacingAndGlyphs">INTERIOR DESIGN STUDIO · COMMERCIAL ARCHITECTURE</text></svg>
        </div>
        <table style={{borderCollapse:"collapse",fontSize:11,minWidth:360}}>
          <tbody>
            <tr><td style={{...hcell,background:TP,color:"#fff"}}>No. Orden</td><td style={{padding:"2px 4px",border:"1px solid #fff"}}>{ed? <input value={d.noOrden||""} onChange={e=>setField(d.id,"noOrden",e.target.value)} style={{...infoInput,fontWeight:600}}/> : <div style={{textAlign:"right",fontWeight:600,padding:"4px 6px"}}>{d.noOrden||""}</div>}</td></tr>
            {infoRow(d,ed,"Proveedor","proveedor",false)}
            {infoRow(d,ed,"Fecha","fecha",true)}
            {infoRow(d,ed,"Semana","semana",false)}
            {infoRow(d,ed,"Obra","obra",false)}
            {infoRow(d,ed,"Dirección de entrega","dir",false)}
            {infoRow(d,ed,"Solicitó","solicito",false)}

        </table>
      </div>

      <div style={{background:TP,textAlign:"center",padding:"6px",minWidth:840}}>
        {ed
          ? <input value={d.titulo||""} onChange={e=>setField(d.id,"titulo",e.target.value)} style={{background:"transparent",border:"none",textAlign:"center",fontFamily:"Georgia,serif",fontSize:15,fontWeight:700,color:"#2b2620",letterSpacing:1,width:"70%",outline:"none"}}/>
          : <span style={{fontFamily:"Georgia,serif",fontSize:15,fontWeight:700,color:"#2b2620",letterSpacing:1}}>{d.titulo||defTitle}</span>}
      </div>

      <table style={{borderCollapse:"collapse",width:"100%",minWidth:840,fontSize:10}}>
        <thead><tr style={{background:TP,color:"#fff"}}>
          {cols.map((h,i)=><th key={i} style={{padding:"5px 6px",border:"1px solid #fff",fontWeight:500}}>{h}</th>)}
        </tr></thead>
        <tbody>
          {(d.rows||[]).map(r=> ed ? (
            <tr key={r.id} style={{borderBottom:"1px solid #eee"}}>
              <td style={{padding:"3px",border:"1px solid #f0ede6"}}><input value={r.cod} onChange={e=>updRow(d.id,r.id,"cod",e.target.value)} style={{...si,fontSize:11,padding:"4px",textAlign:"center"}}/></td>
              <td style={{padding:"3px",border:"1px solid #f0ede6"}}><input value={r.tipo} onChange={e=>updRow(d.id,r.id,"tipo",e.target.value)} style={{...si,fontSize:11,padding:"4px",textAlign:"center"}}/></td>
              <td style={{padding:"3px",border:"1px solid #f0ede6",width:62}}><input type="number" min="0" value={r.cant} onChange={e=>updRow(d.id,r.id,"cant",parseFloat(e.target.value)||0)} style={{...si,fontSize:11,padding:"4px",textAlign:"center",width:52}}/></td>
              <td style={{padding:"3px",border:"1px solid #f0ede6"}}><input value={r.desc} onChange={e=>updRow(d.id,r.id,"desc",e.target.value)} style={{...si,fontSize:11,padding:"4px"}}/></td>
              {!isMat && <td style={{padding:"3px",border:"1px solid #f0ede6",width:96}}><select value={r.luz} onChange={e=>updRow(d.id,r.id,"luz",e.target.value)} style={{...si,fontSize:10,padding:"4px 2px",width:90}}>{LUZ_OPTS.map(o=><option key={o} value={o}>{o||"—"}</option>)}</select></td>}
              {!isMat && <td style={{padding:"3px",border:"1px solid #f0ede6",textAlign:"center",width:80}}>
                {r.foto ? (
                  <div style={{position:"relative",display:"inline-block"}}>
                    <img src={r.foto} style={{maxWidth:60,maxHeight:44,borderRadius:3,display:"block"}}/>
                    <button onClick={()=>updRow(d.id,r.id,"foto","")} style={{position:"absolute",top:-6,right:-6,background:"#c0392b",color:"#fff",border:"none",borderRadius:"50%",width:16,height:16,fontSize:10,cursor:"pointer",lineHeight:1}}>×</button>
                  </div>
                ) : (
                  <label style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:54,height:40,background:"#f4f2ec",border:"1px dashed #cfc9bd",borderRadius:4,color:"#9a958a",cursor:"pointer",fontSize:9}}>
                    <input type="file" accept="image/*" onChange={e=>onFoto(d.id,r.id,e)} style={{display:"none"}}/>+ foto
                  </label>
                )}
              </td>}
              <td style={{padding:"3px",border:"1px solid #f0ede6"}}><input value={r.ubic} onChange={e=>updRow(d.id,r.id,"ubic",e.target.value)} style={{...si,fontSize:11,padding:"4px",textAlign:"center"}}/></td>
              <td style={{padding:"3px",border:"1px solid #f0ede6"}}><input value={r.plano} onChange={e=>updRow(d.id,r.id,"plano",e.target.value)} style={{...si,fontSize:11,padding:"4px",textAlign:"center"}}/></td>
              <td style={{padding:"3px"}}><button onClick={()=>delRow(d.id,r.id)} style={{...sb,padding:4,background:"transparent",color:C.dim}}><IconTrash/></button></td>
            </tr>
          ) : (
            <tr key={r.id} style={{borderBottom:"1px solid #eee"}}>
              <td style={cellRO}>{r.cod||""}</td>
              <td style={cellRO}>{r.tipo||""}</td>
              <td style={cellRO}>{r.cant}</td>
              <td style={cellRO}>{r.desc||""}</td>
              {!isMat && <td style={cellRO}>{r.luz? <span style={{background:"#e3e0d8",padding:"1px 8px",borderRadius:3}}>{r.luz}</span>:"—"}</td>}
              {!isMat && <td style={{...cellRO,padding:"3px"}}>{r.foto? <img src={r.foto} style={{maxWidth:60,maxHeight:44,borderRadius:3}}/>:"—"}</td>}
              <td style={cellRO}>{r.ubic||""}</td>
              <td style={cellRO}>{r.plano||""}</td>
              <td></td>
            </tr>
          ))}
          {(d.rows||[]).length===0 && <tr><td colSpan={cols.length} style={{padding:"8px",textAlign:"center",color:C.dim,fontSize:11}}>Sin materiales</td></tr>}
        </tbody>
      </table>
      {ed && <button onClick={()=>addRow(d.id)} style={{...sb,background:TP,color:"#fff",marginTop:12,fontSize:12}}><IconPlus/> Agregar material</button>}

      {isMat ? (
        <div style={{marginTop:18,borderTop:"1px solid #e2ded5",paddingTop:12,fontSize:11,color:"#55504a",minWidth:600}}>
          <div style={{fontWeight:600,color:"#2f2f2b",marginBottom:8}}>Entrega y recepción:</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px 30px",maxWidth:760}}>
            {[["ENTREGA","entregaNombre","entregaPuesto"],["RECIBE","recibeNombre","recibePuesto"]].map(([lbl,kNom,kPue])=>(
              <div key={lbl}>
                <div style={{fontSize:10,letterSpacing:1,color:"#9a958a",fontWeight:700,marginBottom:6}}>{lbl}</div>
                <div style={{display:"grid",gridTemplateColumns:"70px 1fr",gap:"6px 10px"}}>
                  <span style={{color:"#9a958a",alignSelf:"center"}}>Nombre</span>{ed? <input value={d[kNom]||""} onChange={e=>setField(d.id,kNom,e.target.value)} style={{...si,fontSize:12,padding:"4px 6px"}}/> : <span style={{padding:"4px 0"}}>{d[kNom]||""}</span>}
                  <span style={{color:"#9a958a",alignSelf:"center"}}>Puesto</span>{ed? <input value={d[kPue]||""} onChange={e=>setField(d.id,kPue,e.target.value)} style={{...si,fontSize:12,padding:"4px 6px"}}/> : <span style={{padding:"4px 0"}}>{d[kPue]||""}</span>}
                </div>
              </div>
            ))}
          </div>
          <div style={{marginTop:8,fontSize:10,color:"#9a958a"}}>La fecha y el lugar de entrega se toman del encabezado (Fecha / Dirección de entrega). Las firmas se recaban en el PDF impreso.</div>
        </div>
      ) : (
      <div style={{marginTop:18,borderTop:"1px solid #e2ded5",paddingTop:12,fontSize:11,color:"#55504a",minWidth:600}}>
        <div style={{marginBottom:10,display:"flex",alignItems:"center",gap:8}}><span style={{color:"#9a958a"}}>Autorizó_</span>{ed? <input value={d.autorizo||""} onChange={e=>setField(d.id,"autorizo",e.target.value)} style={{...si,fontSize:12,padding:"4px 6px",width:240}}/> : <b style={{color:"#2f2f2b"}}>{d.autorizo||""}</b>}</div>
        <div style={{fontWeight:600,color:"#2f2f2b",marginBottom:6}}>Emitir Factura a:</div>
        <div style={{display:"grid",gridTemplateColumns:"130px 1fr",gap:"6px 14px",maxWidth:460}}>
          {[["Razón Social","razonSocial"],["RFC","rfc"],["Uso CFDI","usoCfdi"],["Enviar factura a","enviarA"]].map(([lbl,key])=>(
            <React.Fragment key={key}><span style={{color:"#9a958a",alignSelf:"center"}}>{lbl}</span>{ed? <input value={d[key]||""} onChange={e=>setField(d.id,key,e.target.value)} style={{...si,fontSize:12,padding:"4px 6px"}}/> : <span style={{padding:"4px 0"}}>{d[key]||""}</span>}</React.Fragment>
          ))}
        </div>
      </div>
      )}
    </div>
  );

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <h2 style={{fontSize:18,fontWeight:600,color:C.text,margin:0}}>{isMat?"Entrega de Material":"Requisición Eléctrico"}</h2>
        <button onClick={addReq} style={{...sb,background:C.accent,color:"#fff",fontSize:13}}><IconPlus/> Agregar {docLabel.toLowerCase()} nueva</button>
      </div>

      {list.map((d,idx)=>(
        <div key={d.id} style={{background:C.card,borderRadius:12,border:"1px solid "+C.border,marginBottom:12,overflow:"hidden"}}>
          <div onClick={()=>toggle(d.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:d.collapsed?"#f3f2ec":"#faf9f4",cursor:"pointer",flexWrap:"wrap"}}>
            <IconChevron open={!d.collapsed}/>
            <span style={{fontWeight:600,color:C.text,fontSize:14}}>{docLabel} {idx+1}</span>
            <span style={{fontSize:12,color:C.muted}}>Orden {d.noOrden||"—"}{d.proveedor?(" · "+d.proveedor):""}</span>
            {d.saved
              ? <span style={{fontSize:10,background:"#e6ebd4",color:"#5b6033",padding:"2px 8px",borderRadius:20,fontWeight:600}}>Guardada</span>
              : <span style={{fontSize:10,background:"#f4e3cf",color:"#8a5a1b",padding:"2px 8px",borderRadius:20,fontWeight:600}}>En curso</span>}
            <span style={{marginLeft:"auto",fontSize:11,color:C.dim}}>{(d.rows||[]).length} material(es)</span>
          </div>
          {!d.collapsed && (
            <div style={{padding:"8px 16px 16px"}}>
              {renderForm(d, !d.saved)}
              <div style={{display:"flex",gap:8,marginTop:14,flexWrap:"wrap",alignItems:"center"}}>
                {!d.saved
                  ? <button onClick={()=>saveReq(d.id)} style={{...sb,background:C.accent,color:"#fff",fontSize:12}}>💾 Guardar y plegar {docLabel.toLowerCase()}</button>
                  : <button onClick={()=>reopen(d.id)} style={{...sb,background:C.bg,color:C.muted,fontSize:12}}>✎ Reabrir para editar</button>}
                <button onClick={()=>delReq(d.id)} style={{...sb,background:"transparent",color:C.danger,fontSize:12,marginLeft:"auto"}}><IconTrash/> Eliminar {docLabel.toLowerCase()}</button>
              </div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function resumenCalc(grandTotal, payments, providers) {
  const cobrado = (payments||[]).reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const asignado = (providers||[]).reduce((s,p)=>s+(parseFloat(p.asignado)||0),0);
  const pagadoProv = (providers||[]).reduce((s,p)=>s+(p.pagos||[]).reduce((a,r)=>a+(parseFloat(r.monto)||0),0),0);
  const gt = grandTotal||0;
  return { gt, cobrado, saldoCli: gt-cobrado, asignado, pagadoProv, saldoProv: asignado-pagadoProv, margen: gt-pagadoProv, margenPct: gt?Math.round((gt-pagadoProv)/gt*100):0, flujo: cobrado-pagadoProv };
}
const money = (n)=>"$"+(n||0).toLocaleString("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2});

      <span style={{fontWeight:600,color:color||C.text}}>{money(val)}</span>

  return (

function Dashboard({ quotes, onOpen, onNew, onDelete, onLogout, onImport, onUpdate, onRestore, onDuplicate }) {

  const tipoCounts = TIPOS.reduce((acc,t)=>{ acc[t] = sorted.filter(q => !q.deleted && (q.type || "Varias") === t).length; return acc; }, {}); const binCount = sorted.filter(q => q.deleted).length;
  const fileRef = React.useRef(null);
  const handleImport = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    importBackupFromFile(f).then(arr => {

  };

function QuoteEditor({ quote, onSave, onHome }) {
  const [project, setProject] = useState(quote.project||{name:"",client:"",date:today(),location:"",docTitle:"Cotización de Servicios"});
  const [categories, setCategories] = useState(quote.categories||defaultCategories);
  const [items, setItems] = useState(quote.items||defaultItemsMap());
  const [mgmtPct, setMgmtPct] = useState(quote.mgmtPct??18);
  const [ivaPct, setIvaPct] = useState(quote.ivaPct??16);
  const [activeTab, setActiveTab] = useState("quote");
  const [payments, setPayments] = useState(quote.payments||[]);
  const [expenseWeeks, setExpenseWeeks] = useState(()=>migrateExpenseWeeks(quote));
  const expenses = expenseWeeks.reduce((a,w)=>a.concat(w.expenses||[]),[]);
  const [materials, setMaterials] = useState(()=> migrateMaterials(quote));
  const [electricReqs, setElectricReqs] = useState(()=> migrateElectricReqs(quote));
  const [personal, setPersonal] = useState(quote.personal||defaultPersonal(quote.project));
  const [providers, setProviders] = useState(quote.providers||[]);
  const [printing, setPrinting] = useState(false);
  const [printWeekId, setPrintWeekId] = useState(null);
  const [savedLabel, setSavedLabel] = useState("");

  // Auto-save on any change
  useEffect(()=>{
    const t = setTimeout(()=>{
      onSave({ project, categories, items, mgmtPct, ivaPct, payments, expenses, expenseWeeks, materials, electricReqs, personal, providers });
      setSavedLabel("✓ Guardado");
      const t2 = setTimeout(()=>setSavedLabel(""), 1500);
      return ()=>clearTimeout(t2);
    }, 400);
    return ()=>clearTimeout(t);
  }, [project, categories, items, mgmtPct, ivaPct, payments, expenseWeeks, materials, electricReqs, personal, providers]);

  const subtotal = Object.values(items).flat().reduce((s,i)=>s+i.qty*i.price,0);
  const mgmt = subtotal*(mgmtPct/100);
  const iva = (subtotal+mgmt)*(ivaPct/100);
  const grandTotal = subtotal+mgmt+iva;

  const handleItemChange = useCallback((catId,itemId,field,val)=>{
    setItems(prev=>({...prev,[catId]:prev[catId].map(i=>i.id===itemId?{...i,[field]:val}:i)}));
  },[]);
  const addItem = useCallback((catId,prefix)=>{
    setItems(prev=>{const existing=prev[catId]||[];return{...prev,[catId]:[...existing,emptyItem(prefix,existing.length+1)]}});
  },[]);
  const removeItem = useCallback((catId,itemId)=>{
    setItems(prev=>({...prev,[catId]:prev[catId].filter(i=>i.id!==itemId)}));
  },[]);
  const moveItem = useCallback((catId,itemId,direction)=>{
    setItems(prev=>{
      const arr = [...(prev[catId]||[])];
      const idx = arr.findIndex(i=>i.id===itemId);
      const newIdx = idx + direction;
      if (idx < 0 || newIdx < 0 || newIdx >= arr.length) return prev;
      [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
      return {...prev,[catId]:arr};
    });
  },[]);
  const addCategory = () => {
    const num=String(categories.length+1).padStart(2,"0");
    const id="CAT_"+uid();
    setCategories(prev=>[...prev,{id,num,name:"NUEVA CATEGORÍA",prefix:"NC"}]);
    setItems(prev=>({...prev,[id]:[]}));
  };
  const removeCategory = (catId) => {
    setCategories(prev=>prev.filter(c=>c.id!==catId));
    setItems(prev=>{const n={...prev};delete n[catId];return n});
  };
  const moveCategory = (catId, direction) => {
    setCategories(prev=>{
      const idx = prev.findIndex(c=>c.id===catId);
      const newIdx = idx + direction;
      if (idx < 0 || newIdx < 0 || newIdx >= prev.length) return prev;
      const arr = [...prev];
      [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
      return arr.map((c,i)=>({...c,num:String(i+1).padStart(2,"0")}));
    });
  };
  const swapCategoriesByDrop = (sourceCatId, targetCatId) => {
    if (!sourceCatId || !targetCatId || sourceCatId===targetCatId) return;
    setCategories(prev=>{
      const src = prev.find(c=>c.id===sourceCatId);
      const tgt = prev.find(c=>c.id===targetCatId);
      if (!src || !tgt) return prev;
      const srcNum = src.num, tgtNum = tgt.num;
      return prev.map(c=>{
        if (c.id===sourceCatId) return {...c,num:tgtNum};
        if (c.id===targetCatId) return {...c,num:srcNum};
        return c;
      });
    });
  };
  const updateCategory = (catId,field,val) => {
    setCategories(prev=>prev.map(c=>c.id===catId?{...c,[field]:val}:c));
  };
  const handlePrint = () => {
    setPrintWeekId(null);
    setPrinting(true);
    var onAfter = () => { setPrinting(false); window.removeEventListener("afterprint", onAfter); };
    window.addEventListener("afterprint", onAfter);
    setTimeout(()=>window.print(),350);
  };
  const handlePrintWeek = (wid) => {
    setPrintWeekId(wid);
    setPrinting(true);
    var onAfter = () => { setPrinting(false); setPrintWeekId(null); window.removeEventListener("afterprint", onAfter); };
    window.addEventListener("afterprint", onAfter);
    setTimeout(()=>window.print(),350);
  };

  return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Inter',-apple-system,sans-serif"}}>

        activeTab==="payments" ? <PaymentsPrintView project={project} payments={payments} grandTotal={grandTotal} />
        : activeTab==="expenses" ? <ExpensesPrintView project={project} expenseWeeks={expenseWeeks} printWeekId={printWeekId} />
        : activeTab==="electrico" ? <ElectricReqPrintView reqs={electricReqs} />
        : activeTab==="materials" ? <ElectricReqPrintView reqs={materials} variant="material" />
        : activeTab==="personal" ? <PersonalPrintView project={project} personal={personal} />
        : activeTab==="providers" ? <ProveedoresPrintView project={project} providers={providers} />
        : activeTab==="resumen" ? <ResumenPrintView project={project} grandTotal={grandTotal} payments={payments} providers={providers} mgmt={mgmt} mgmtPct={mgmtPct} />
        : <PrintView project={project} categories={categories} items={items} mgmtPct={mgmtPct} ivaPct={ivaPct} />
      )}
      <div style={{maxWidth:1100,margin:"0 auto",padding:"32px 24px"}}>
        <Header project={project} setProject={setProject} onHome={onHome} savedLabel={savedLabel}
          onSaveNow={()=>{ const ok = onSave({ project, categories, items, mgmtPct, ivaPct, payments, expenses, expenseWeeks, materials, electricReqs, personal, providers }); setSavedLabel(ok===false?"⚠ Error":"✓ Guardado"); setTimeout(()=>setSavedLabel(""), 2000); }}
          onDownload={()=>{ exportSingleQuote({ ...quote, project, categories, items, mgmtPct, ivaPct, payments, expenses, expenseWeeks, materials, electricReqs, personal, providers, updatedAt: Date.now() }); }}
        />
        <div style={{display:"flex",gap:4,marginBottom:24,borderBottom:"1px solid "+C.border,paddingBottom:0}}>
          {tabs.map(tab=>(
            <button key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{...sb,background:activeTab===tab.id?C.card:"transparent",color:activeTab===tab.id?C.accent:C.muted,borderRadius:"8px 8px 0 0",padding:"10px 20px",borderBottom:activeTab===tab.id?"2px solid "+C.accent:"2px solid transparent",fontSize:13}}>{tab.label}</button>
          ))}
          <div style={{flex:1}} />
          <button onClick={handlePrint} style={{...sb,background:C.accent,color:"#fff",padding:"8px 20px",fontWeight:700}}><IconPdf/> Exportar PDF</button>
        </div>
        {activeTab==="quote" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <input value={project.docTitle || "Cotización de Servicios"} onChange={e=>setProject(p=>({...p,docTitle:e.target.value}))} title="Editar título del documento (se usa en el PDF)" placeholder="Título del documento" style={{fontSize:18,fontWeight:600,margin:0,flex:1,maxWidth:520,border:"none",borderBottom:"1px dashed "+C.border,background:"transparent",color:C.text,outline:"none",padding:"2px 0",fontFamily:"inherit"}} onFocus={e=>e.target.style.borderBottomColor=C.accent} onBlur={e=>e.target.style.borderBottomColor=C.border} />
              <button onClick={addCategory} style={{...sb,background:C.accent,color:"#fff",fontWeight:700}}><IconPlus/> Nueva categoría</button>
            </div>
            {[...categories].sort((a,b)=>{const na=parseFloat(a.num)||0;const nb=parseFloat(b.num)||0;return na-nb;}).map(cat=>(
              <CategorySection key={cat.id} cat={cat} items={items[cat.id]||[]} onItemChange={(itemId,f,v)=>handleItemChange(cat.id,itemId,f,v)} onAddItem={()=>addItem(cat.id,cat.prefix)} onRemoveItem={itemId=>removeItem(cat.id,itemId)} onMoveItem={(itemId,dir)=>moveItem(cat.id,itemId,dir)} onUpdateCat={(f,v)=>updateCategory(cat.id,f,v)} onRemoveCat={()=>removeCategory(cat.id)} onMoveUp={()=>moveCategory(cat.id,-1)} onMoveDown={()=>moveCategory(cat.id,1)} canMoveUp={categories[0]?.id!==cat.id} canMoveDown={categories[categories.length-1]?.id!==cat.id} onSwapWith={(srcId)=>swapCategoriesByDrop(srcId,cat.id)} />
            ))}
            <TotalsSection categories={categories} items={items} mgmtPct={mgmtPct} setMgmtPct={setMgmtPct} ivaPct={ivaPct} setIvaPct={setIvaPct} />
            <div style={{marginTop:24,padding:16,background:C.card,borderRadius:10,border:"1px solid "+C.border,fontSize:11,color:C.dim,lineHeight:1.8}}>
              <p style={{margin:0}}>• Esta cotización será válida hasta 10 días naturales posteriores a su entrega, aunque el trabajo cotizado se haya realizado o no.</p>
              <p style={{margin:0}}>• Cualquier imprevisto que surja en obra siendo caso de remodelación, puede generar un sobre costo al mismo.</p>
              <p style={{margin:0}}>• No incluye licencias, peritos o tramitología ante cualquier dependencia.</p>

        {activeTab==="payments" && <PaymentsTab payments={payments} setPayments={setPayments} grandTotal={grandTotal} />}
        {activeTab==="expenses" && <ExpensesTab expenseWeeks={expenseWeeks} setExpenseWeeks={setExpenseWeeks} onPrintWeek={handlePrintWeek} />}
        {activeTab==="materials" && <ElectricReqTab reqs={materials} setReqs={setMaterials} variant="material" />}

    </div>
  );
}

function App() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [quotes, setQuotes] = useState(loadQuotes);
  useEffect(()=>{ const ref=fbDb.ref("presupuestos"); const unsub=ref.on("value",(snap)=>{ const cloud=snap.val(); if(cloud&&Array.isArray(cloud)){ setQuotes(function(prev){var m=new Map();var ts=function(q){return (q&&(q.updatedAt||q.at))||0;};var ord=[];var i;for(i=0;i<(cloud||[]).length;i++){var qc=cloud[i];if(qc&&qc.id){ord.push(qc.id);m.set(qc.id,qc);}}var lastSync=window._lastSyncAt||0;for(i=0;i<(prev||[]).length;i++){var qp=prev[i];if(!qp||!qp.id)continue;if(m.has(qp.id)){if(ts(qp)>ts(m.get(qp.id)))m.set(qp.id,qp);}else if(ts(qp)>lastSync){ord.push(qp.id);m.set(qp.id,qp);}}var merged=ord.map(function(id){return m.get(id);}).filter(Boolean);try{localStorage.setItem(QKEY,JSON.stringify(merged));}catch(e){}window._lastSyncAt=Date.now();try{document.dispatchEvent(new Event("herza-sync-end"));}catch(_){}return merged;}); } }); return ()=>ref.off("value",unsub); },[]);

  const [currentId, setCurrentId] = useState(null);

  const current = currentId ? quotes.find(q => q.id === currentId) : null;

  const openQuote = (id) => setCurrentId(id);
  const newQuote = (tipo) => {
    const q = makeNewQuote();
    if (tipo) q.type = tipo;
    setQuotes(prev => { const nx = [q, ...prev]; saveAllQuotes(nx); return nx; });
    setCurrentId(q.id);
  };
  const goHome = () => setCurrentId(null);
  const isQuoteEmpty = (q) => !q || (!q.project?.name?.trim() && !q.project?.client?.trim() && !Object.values(q.items || {}).some(arr => Array.isArray(arr) && arr.some(it => (it.concept && it.concept.trim()) || Number(it.qty) > 0 || Number(it.cost) > 0)));
  const deleteQuote = (id) => {
    setQuotes(prev => {
      const q = prev.find(x => x.id === id);
      if (q?.deleted || isQuoteEmpty(q)) {
        if (!window.confirm("¿Eliminar esta cotización permanentemente?")) return prev;
        const nx = prev.filter(x => x.id !== id);
        saveAllQuotes(nx);
        return nx;
      }
      const nx = prev.map(x => x.id === id ? {...x, deleted: true, updatedAt: Date.now()} : x);
      saveAllQuotes(nx);
      return nx;
    });
  };
  const restoreQuote = (id) => { setQuotes(prev => { const nx = prev.map(x => x.id === id ? {...x, deleted: false, updatedAt: Date.now()} : x); saveAllQuotes(nx); return nx; }); };
  const duplicateQuote = (id) => {
    setQuotes(prev => {
      const orig = prev.find(x => x.id === id);
      if (!orig) return prev;
      const copy = JSON.parse(JSON.stringify(orig));
      copy.id = "Q_"+uid();
      copy.deleted = false;
      copy.createdAt = Date.now();
      copy.updatedAt = Date.now();
      copy.project = { ...(copy.project || {}), name: ((orig.project && orig.project.name) || "Cotización") + " (copia)" };
      const idx = prev.findIndex(x => x.id === id);
      const nx = [...prev.slice(0, idx + 1), copy, ...prev.slice(idx + 1)];
      saveAllQuotes(nx);
      return nx;
    });
  };
  const saveCurrent = (data) => {
    let ok = true;
    setQuotes(prev => {
      const nx = prev.map(q => q.id === currentId ? { ...q, ...data, updatedAt: Date.now() } : q);
      ok = saveAllQuotes(nx);
      return nx;
    });
    return ok;
  };
  const updateQuote = (id, data) => { setQuotes(prev => { const nx = prev.map(q => q.id === id ? { ...q, ...data, updatedAt: Date.now() } : q); saveAllQuotes(nx); return nx; }); };
  const importQuotes = (arr, mode) => {
    setQuotes(prev => {
      let nx;
      if (mode === "replace") {
        nx = arr;
      } else {
        const byId = new Map(prev.map(q => [q.id, q]));
        arr.forEach(q => {
          if (!q.id) q.id = "Q_"+Math.random().toString(36).slice(2,9);
          if (byId.has(q.id)) q.id = q.id+"_imp"+Math.random().toString(36).slice(2,5);
          byId.set(q.id, q);
        });
        nx = Array.from(byId.values());
      }
      saveAllQuotes(nx);
      return nx;
    });
    window.alert("Respaldo importado: "+arr.length+" cotización(es).");
  };

  if (!loggedIn) return <LoginScreen onLogin={() => setLoggedIn(true)} />;
  if (!current) return <Dashboard quotes={quotes} onOpen={openQuote} onNew={newQuote} onDelete={deleteQuote} onLogout={() => setLoggedIn(false)} onImport={importQuotes} onUpdate={updateQuote} onRestore={restoreQuote} onDuplicate={duplicateQuote} />;
  return <QuoteEditor key={current.id} quote={current} onSave={saveCurrent} onHome={goHome} />;
}

      ov.querySelector('#_hzL').onclick=async function(){
        const u=(ov.querySelector('#_hzU').value||'').trim().toLowerCase(),p=ov.querySelector('#_hzP').value||'';
        const r=await sb.auth.signInWithPassword({email:u+'@herzahome.app',password:p});
        if(r.error){ov.querySelector('#_hzErr').textContent='Usuario o contraseña incorrectos';return}
        const uid=(await sb.auth.getUser()).data.user.id;
        const {data:perfil}=await sb.from('perfiles').select('rol,activo').eq('id',uid).single();
        if(!perfil||['admin','pm','supervisor'].indexOf(perfil.rol)<0||!perfil.activo){ov.querySelector('#_hzErr').textContent='Esta cuenta no tiene permiso de oficina';await sb.auth.signOut();return}
        ov.remove();pickObra();
      };
    } else { pickObra(); }
  }
  async function pickObra(){
    const {data:obras}=await sb.from('obras').select('id,nombre').eq('archivada',false).order('created_at');
    const opts=(obras||[]).map(function(o){return '<option value="'+o.id+'">'+o.nombre+'</option>'}).join('');
    const cur=getObra();
    const ov=modal('<h3 style="margin:0 0 4px;font-size:18px;font-weight:600">Conectar con app obra</h3><p style="margin:0 0 16px;font-size:13px;color:#777">Elige a qué obra se enviarán las relaciones de gastos.</p><select id="_hzO" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;margin-bottom:14px">'+(opts||'<option value="">No hay obras disponibles</option>')+'</select><div style="display:flex;gap:10px;justify-content:flex-end"><button id="_hzC" style="padding:9px 14px;border:1px solid #ddd;background:#fff;border-radius:8px;cursor:pointer">Cancelar</button><button id="_hzS" style="padding:9px 16px;border:none;background:#7a8a3f;color:#fff;border-radius:8px;cursor:pointer">Conectar</button></div>');
    if(cur&&cur.id)ov.querySelector('#_hzO').value=cur.id;
    ov.querySelector('#_hzC').onclick=function(){ov.remove()};
    ov.querySelector('#_hzS').onclick=function(){var sel=ov.querySelector('#_hzO');var id=sel.value;if(!id){toast('No hay obras para conectar',false);return}setObra({id:id,nombre:sel.options[sel.selectedIndex].text});ov.remove();toast('Conectado a '+sel.options[sel.selectedIndex].text);};
  }
  async function enviar(week, idx, total){
    const {data:{session}}=await sb.auth.getSession();
    const obra=getObra();
    if(!session||!obra||!obra.id){toast('Primero conecta con la app de obra',false);conectar();return}
    toast('Enviando relación de gastos…');
    try{
      const {jsPDF}=window.jspdf;const doc=new jsPDF();
      doc.setFontSize(15);doc.text('Relación de Gastos — Semana '+(idx+1),14,18);
      doc.setFontSize(10);doc.setTextColor(90);
      doc.text('Obra: '+obra.nombre,14,26);doc.text('Fecha: '+fmtD(week.date),14,32);
      const rows=(week.expenses||[]).map(function(e){return [fmtD(e.date),e.agent||'',e.concept||'',e.unit||'',String(e.qty||0),fmtM(e.price),fmtM((e.qty||0)*(e.price||0)),e.method||'']});
      doc.autoTable({startY:38,head:[['Fecha','Categoría','Concepto','Und','Cant','P.U.','Importe','Método']],body:rows,styles:{fontSize:8,cellPadding:2},headStyles:{fillColor:[122,138,63]}});
      const fy=doc.lastAutoTable.finalY||40;
      doc.setFontSize(12);doc.setTextColor(40);doc.text('Total pagado: '+fmtM(total),14,fy+12);
      doc.text('Gerenciamiento 10%: '+fmtM(total*0.10),14,fy+19);
      const blob=doc.output('blob');
      const sem='Semana '+(idx+1);
      const path=obra.id+'/'+sem.replace(' ','')+'_'+Date.now()+'.pdf';
      const up=await sb.storage.from('gastos').upload(path,blob,{contentType:'application/pdf'});
      if(up.error)throw up.error;
      const uid=(await sb.auth.getUser()).data.user.id;
      const ai=await sb.from('archivos').insert({obra_id:obra.id,tipo:'gasto',nombre:'Relación de gastos — '+sem,semana:sem,storage_path:path,subido_por:uid,subido_por_nombre:'Presupuestos'});
      if(ai.error)throw ai.error;
      await sb.from('notificaciones').insert({obra_id:obra.id,tipo:'gasto',titulo:'Nueva relación de gastos',detalle:sem+' · '+fmtM(total),ruta:'gastos'});
      toast('✓ Enviada a '+obra.nombre);
    }catch(e){toast('No se pudo enviar: '+((e&&e.message)||e),false);}
  }
  window.HZObra={conectar:conectar,enviar:enviar,getObra:getObra};
})();
</script></body>
</html>
